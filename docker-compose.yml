services:
  api:
    build: .
    container_name: mealapi_php
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: mealapi_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mealapi
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: mealapi_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db